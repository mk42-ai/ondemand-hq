<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" role="img" aria-label="مكتب شؤون التنمية — ODA">
  <!-- ODA Arabic brand mark — inherently transparent SVG.
       Left: geometric falcon-arc emblem in ODA gold/teal.
       Right: Arabic wordmark "مكتب شؤون التنمية" over Latin "ODA". -->
  <defs>
    <linearGradient id="odaGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9a44f"/>
      <stop offset="1" stop-color="#9a7728"/>
    </linearGradient>
  </defs>

  <!-- Emblem: three nested crescents suggesting a falcon wing / rising dune -->
  <g transform="translate(6,6)">
    <path d="M26 0C11.6 0 0 11.6 0 26s11.6 26 26 26c6.2 0 11.9-2.2 16.4-5.8C38.9 48.7 34.6 50 30 50 16.7 50 6 39.3 6 26S16.7 2 30 2c4.6 0 8.9 1.3 12.4 3.8C37.9 2.2 32.2 0 26 0z" fill="url(#odaGold)"/>
    <path d="M31 7c-10.5 0-19 8.5-19 19s8.5 19 19 19c4.5 0 8.7-1.6 12-4.2C40.6 42.6 37.4 43.5 34 43.5c-9.7 0-17.5-7.8-17.5-17.5S24.3 8.5 34 8.5c3.4 0 6.6.9 9 2.7C39.7 8.6 35.5 7 31 7z" fill="#0f6b5c"/>
    <circle cx="38" cy="26" r="5.2" fill="url(#odaGold)"/>
  </g>

  <!-- Arabic wordmark: مكتب شؤون التنمية -->
  <text x="70" y="30" direction="rtl" font-family="'Noto Naskh Arabic','Geeza Pro','Amiri',serif"
        font-size="19" font-weight="700" fill="#101418">مكتب شؤون التنمية</text>

  <!-- Latin sub-mark -->
  <text x="70" y="52" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="600" letter-spacing="6" fill="#0f6b5c">ODA</text>
  <rect x="132" y="44" width="60" height="2.2" rx="1.1" fill="url(#odaGold)"/>
</svg>
